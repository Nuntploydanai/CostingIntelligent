<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Shirts Costing Tool v2 - Node.js</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 600px;
            text-align: center;
        }
        h1 { color: #4F46E5; margin-bottom: 20px; }
        p { color: #6B7280; margin-bottom: 15px; }
        .status { color: #10B981; font-weight: bold; margin: 20px 0; }
        .info { background: #EEF2FF; padding: 15px; border-radius: 8px; margin: 10px 0; }
        a { color: #4F46E5; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👕 Basic Shirts Costing Tool v2</h1>
        <p class="status">✅ Node.js Server is Running!</p>
        <div class="info">
            <p><strong>Backend:</strong> http://localhost:8000</p>
            <p><strong>Frontend:</strong> http://localhost:5173</p>
        </div>
        <p>If you see this page, the backend is working!</p>
        <p style="margin-top: 20px;">
            <a href="http://localhost:5173" target="_blank">Open React App →</a>
        </p>
        <p style="margin-top: 30px; font-size: 14px; color: #9CA3AF;">
            Node.js v2 | <a href="https://github.com/Nuntploydanai/CostingIntelligent" target="_blank">GitHub</a>
        </p>
    </div>
</body>
</html>
